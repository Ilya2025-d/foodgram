server {
  listen 80;
  server_name ilyahost.sytes.net;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000;
  }

  location /media/ {
    root /var/html/;
  }

  location /static/ {
    alias /var/html/;
}

  location / {
    root /var/html/frontend;
    index index.html index.htm;
    try_files $uri /index.html;
  }
}
