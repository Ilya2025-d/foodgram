version: '3'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:15-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data/
    env_file:
      - .env
  backend:
    image: kisame2011/foodgram_backend:latest
    env_file:
      - .env
    volumes:
      - static:/app/static/
      - media:/app/media/
    depends_on:
      - db
  frontend:
    image: kisame2011/foodgram_frontend:latest
    env_file:
      - .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/static
  gateway:
    image: kisame2011/foodgram_gateway:latest
    volumes:
      - static:/staticfiles
      - media:/media
    depends_on:
      - backend
      - frontend
    ports:
      - 8000:80
